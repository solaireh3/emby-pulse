<div class="fixed bottom-5 w-[88%] left-[6%] z-50 sm:hidden transition-transform duration-500 ease-in-out" 
     :class="isScrollingDown ? 'translate-y-32' : 'translate-y-0'">
    
    <div class="bg-white/80 dark:bg-[#111]/80 backdrop-blur-3xl rounded-[2rem] shadow-[0_10px_30px_rgba(0,0,0,0.1)] dark:shadow-[0_15px_40px_rgba(0,0,0,0.8)] border border-white/60 dark:border-white/10 px-2 py-1.5 flex justify-around items-center">
        
        <button @click="switchTab('explore');" class="flex flex-col items-center justify-center w-full relative py-1 group transition-colors" :class="currentTab === 'explore' ? 'text-brand-500 dark:text-brand-400' : 'text-slate-400 dark:text-zinc-500'">
            <div class="absolute -top-1.5 w-6 h-1 bg-brand-500 dark:bg-brand-400 rounded-b-full transition-transform duration-300 scale-x-0" :class="currentTab === 'explore' ? 'scale-x-100' : ''"></div>
            <i class="fa-solid fa-house text-[17px] mb-0.5 transition-transform duration-300" :class="currentTab === 'explore' ? 'scale-110 drop-shadow-sm' : 'group-active:scale-90'"></i>
            <span class="text-[9px] font-black tracking-wider transition-opacity" :class="currentTab === 'explore' ? 'opacity-100' : 'opacity-80'">首页</span>
        </button>

        <button @click="switchTab('request');" class="flex flex-col items-center justify-center w-full relative py-1 group transition-colors" :class="currentTab === 'request' ? 'text-brand-500 dark:text-brand-400' : 'text-slate-400 dark:text-zinc-500'">
            <div class="absolute -top-1.5 w-6 h-1 bg-brand-500 dark:bg-brand-400 rounded-b-full transition-transform duration-300 scale-x-0" :class="currentTab === 'request' ? 'scale-x-100' : ''"></div>
            <i class="fa-solid fa-wand-magic-sparkles text-[17px] mb-0.5 transition-transform duration-300" :class="currentTab === 'request' ? 'scale-110 drop-shadow-sm' : 'group-active:scale-90'"></i>
            <span class="text-[9px] font-black tracking-wider transition-opacity" :class="currentTab === 'request' ? 'opacity-100' : 'opacity-80'">心愿</span>
        </button>

        <button @click="switchTab('profile');" class="flex flex-col items-center justify-center w-full relative py-1 group transition-colors" :class="currentTab === 'profile' ? 'text-brand-500 dark:text-brand-400' : 'text-slate-400 dark:text-zinc-500'">
            <div class="absolute -top-1.5 w-6 h-1 bg-brand-500 dark:bg-brand-400 rounded-b-full transition-transform duration-300 scale-x-0" :class="currentTab === 'profile' ? 'scale-x-100' : ''"></div>
            <i class="fa-solid fa-user-astronaut text-[17px] mb-0.5 transition-transform duration-300" :class="currentTab === 'profile' ? 'scale-110 drop-shadow-sm' : 'group-active:scale-90'"></i>
            <span class="text-[9px] font-black tracking-wider transition-opacity" :class="currentTab === 'profile' ? 'opacity-100' : 'opacity-80'">我的</span>
        </button>
        
    </div>
</div>

<div class="hidden sm:flex fixed bottom-8 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 hover:-translate-y-1 group">
    <div class="glass-panel p-1.5 rounded-full inline-flex relative w-[460px] bg-white/90 dark:bg-[#0a0a0a]/90 shadow-[0_20px_60px_rgba(0,0,0,0.15)] dark:shadow-[0_25px_70px_rgba(0,0,0,0.8)] border border-slate-200/80 dark:border-white/10 backdrop-blur-2xl">
        <div class="absolute inset-y-1.5 left-1.5 w-[calc(33.33%-4px)] bg-slate-100/80 dark:bg-[#1f1f1f] rounded-full transition-all duration-500 cubic-bezier(0.25, 1, 0.5, 1) shadow-sm border border-slate-200/50 dark:border-white/5" :class="currentTab === 'explore' ? 'translate-x-0' : (currentTab === 'request' ? 'translate-x-full' : 'translate-x-[200%]')"></div>
        <button @click="switchTab('explore');" class="flex-1 relative z-10 py-3 text-sm font-black transition-colors duration-300 flex justify-center items-center gap-2.5" :class="currentTab === 'explore' ? 'text-brand-600 dark:text-brand-400' : 'text-slate-400 hover:text-slate-800 dark:text-zinc-500 dark:hover:text-zinc-200'">
            <i class="fa-solid fa-house text-lg"></i> <span class="tracking-widest">首页大厅</span>
        </button>
        <button @click="switchTab('request');" class="flex-1 relative z-10 py-3 text-sm font-black transition-colors duration-300 flex justify-center items-center gap-2.5" :class="currentTab === 'request' ? 'text-brand-600 dark:text-brand-400' : 'text-slate-400 hover:text-slate-800 dark:text-zinc-500 dark:hover:text-zinc-200'">
            <i class="fa-solid fa-wand-magic-sparkles text-lg"></i> <span class="tracking-widest">心愿工坊</span>
        </button>
        <button @click="switchTab('profile');" class="flex-1 relative z-10 py-3 text-sm font-black transition-colors duration-300 flex justify-center items-center gap-2.5" :class="currentTab === 'profile' ? 'text-brand-600 dark:text-brand-400' : 'text-slate-400 hover:text-slate-800 dark:text-zinc-500 dark:hover:text-zinc-200'">
            <i class="fa-solid fa-user-astronaut text-lg"></i> <span class="tracking-widest">我的画像</span>
        </button>
    </div>
</div>
