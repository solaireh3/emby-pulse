<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索宇宙 | EmbyPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .fade-enter { opacity: 0; transform: translateY(15px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        /* 酷炫的顶部渐变横幅背景 */
        .hero-pattern {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }
        /* 自定义滚动条隐藏，提升移动端美感 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col font-sans">

    <header class="glass-header sticky top-0 z-50 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 sm:h-16 flex items-center justify-between">
            <div class="font-extrabold text-lg sm:text-xl tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 flex items-center">
                <i class="fa-solid fa-infinity text-indigo-600 mr-2"></i> Pulse Wishlist
            </div>
            <div id="nav-user-info" class="hidden text-xs sm:text-sm font-medium flex items-center bg-gray-100 rounded-full px-3 py-1.5 shadow-inner">
                <span id="current-username" class="mr-3 text-gray-700 font-bold"></span>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full flex flex-col relative pb-20">
        
        <div id="login-section" class="w-full max-w-md mx-auto mt-20 px-4 fade-enter-active hidden">
            <div class="bg-white rounded-3xl p-8 shadow-2xl border border-gray-100">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
                        <i class="fa-solid fa-fingerprint"></i>
                    </div>
                    <h2 class="text-2xl font-extrabold text-gray-800">授权验证</h2>
                    <p class="text-sm text-gray-500 mt-2">连接您的 Emby 媒体库账号</p>
                </div>
                <div class="space-y-5">
                    <div>
                        <input type="text" id="username" class="w-full bg-gray-50 px-5 py-3.5 rounded-xl border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition font-medium" placeholder="Emby 用户名">
                    </div>
                    <div>
                        <input type="password" id="password" class="w-full bg-gray-50 px-5 py-3.5 rounded-xl border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition font-medium" placeholder="••••••••">
                    </div>
                    <button onclick="doLogin()" id="login-btn" class="w-full mt-2 bg-gray-900 hover:bg-black text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-0.5">
                        进入心愿单
                    </button>
                    <p id="login-error" class="text-red-500 text-sm text-center font-medium hidden mt-2"></p>
                </div>
            </div>
        </div>

        <div id="main-section" class="w-full hidden fade-enter flex flex-col">
            
            <div class="hero-pattern w-full pt-12 pb-24 px-4 sm:px-6 text-center text-white rounded-b-[2.5rem] sm:rounded-b-[4rem] shadow-2xl relative overflow-hidden">
                <div class="absolute inset-0 bg-black/20"></div>
                <div class="relative z-10 max-w-2xl mx-auto">
                    <h1 class="text-3xl sm:text-5xl font-black mb-4 tracking-tight">发现<span class="text-indigo-300">未知</span>，触手可及</h1>
                    <p class="text-gray-200 text-sm sm:text-lg mb-8 opacity-90 font-medium">输入你想看的电影或剧集，我们将自动为您拉取并入库。</p>
                    
                    <div class="relative group">
                        <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-500"></div>
                        <div class="relative bg-white rounded-2xl shadow-xl flex items-center p-2 sm:p-3">
                            <i class="fa-solid fa-magnifying-glass text-gray-400 text-xl ml-3"></i>
                            <input type="text" id="search-input" onkeypress="if(event.key === 'Enter') doSearch()" class="w-full pl-3 pr-4 py-2 sm:py-3 bg-transparent text-gray-800 text-base sm:text-lg font-medium outline-none placeholder-gray-400" placeholder="例如：沙丘2 / 权力的游戏...">
                            <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 sm:py-3 rounded-xl font-bold transition-colors shadow-md hidden sm:block">搜 索</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="max-w-6xl mx-auto w-full px-4 sm:px-6 -mt-10 relative z-20">
                <div class="bg-white/90 backdrop-blur-md p-1.5 rounded-2xl shadow-lg inline-flex mb-8 border border-gray-100">
                    <button onclick="switchTab('search')" id="tab-search" class="px-6 py-2.5 rounded-xl text-sm font-bold bg-gray-900 text-white shadow-md transition-all">🪐 探索大厅</button>
                    <button onclick="switchTab('my')" id="tab-my" class="px-6 py-2.5 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-800 transition-all">📋 我的队列</button>
                </div>

                <div id="panel-search" class="w-full">
                    <div id="search-loading" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
                        <script>
                            document.write(Array(5).fill(`
                                <div class="bg-white rounded-2xl p-2 shadow-sm animate-pulse border border-gray-100">
                                    <div class="w-full aspect-[2/3] bg-gray-200 rounded-xl mb-3"></div>
                                    <div class="h-4 bg-gray-200 rounded-md w-3/4 mb-2 mx-2"></div>
                                    <div class="h-3 bg-gray-100 rounded-md w-1/2 mx-2 mb-2"></div>
                                </div>
                            `).join(''));
                        </script>
                    </div>
                    
                    <div id="search-results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6"></div>
                </div>

                <div id="panel-my" class="w-full hidden">
                    <div id="my-loading" class="hidden text-center text-gray-400 py-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
                    <div id="my-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-[100] flex items-center whitespace-nowrap"></div>

    <script>
        const isLogged = {{ 'true' if req_user else 'false' }};
        const currentUserName = "{{ req_user.Name if req_user else '' }}";

        window.onload = () => {
            if (isLogged) {
                document.getElementById('nav-user-info').classList.remove('hidden');
                document.getElementById('current-username').innerText = currentUserName;
                showSection('main-section');
                loadMyRequests();
            } else {
                showSection('login-section');
            }
        };

        function showSection(id) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.add('hidden');
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            setTimeout(() => target.classList.add('fade-enter-active'), 50);
        }

        function switchTab(tab) {
            const tSearch = document.getElementById('tab-search');
            const tMy = document.getElementById('tab-my');
            document.getElementById('panel-search').classList.add('hidden');
            document.getElementById('panel-my').classList.add('hidden');

            const activeClass = "px-6 py-2.5 rounded-xl text-sm font-bold bg-gray-900 text-white shadow-md transition-all";
            const inactiveClass = "px-6 py-2.5 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-800 transition-all";

            if (tab === 'search') {
                tSearch.className = activeClass; tMy.className = inactiveClass;
                document.getElementById('panel-search').classList.remove('hidden');
            } else {
                tMy.className = activeClass; tSearch.className = inactiveClass;
                document.getElementById('panel-my').classList.remove('hidden');
                loadMyRequests();
            }
        }

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            toast.innerHTML = type === 'error' ? `<i class="fa-solid fa-circle-exclamation mr-2 text-lg"></i>${msg}` : `<i class="fa-solid fa-circle-check mr-2 text-lg"></i>${msg}`;
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 translate-y-0 opacity-100 transition-all duration-300 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm z-[100] flex items-center whitespace-nowrap ${type === 'error' ? 'bg-red-500' : 'bg-gray-900'}`;
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }

        async function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');
            
            if (!u || !p) { err.innerText = "账号密码不能为空"; err.classList.remove('hidden'); return; }
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 验证中...';
            err.classList.add('hidden');

            try {
                const res = await fetch('/api/requests/auth', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.status === 'success') window.location.reload();
                else { err.innerText = data.message; err.classList.remove('hidden'); }
            } catch (e) { err.innerText = "网络连接异常"; err.classList.remove('hidden'); }
            btn.innerHTML = '进入心愿单';
        }

        async function doSearch() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('search-loading').classList.remove('hidden');

            try {
                const res = await fetch(`/api/requests/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                document.getElementById('search-loading').classList.add('hidden');
                
                if (data.status === 'success' && data.data.length > 0) {
                    let html = '';
                    data.data.forEach(item => {
                        const defaultPoster = 'https://via.placeholder.com/500x750.png?text=No+Poster';
                        const typeIcon = item.media_type === 'movie' ? '🎬' : '📺';
                        
                        // 🔥 移动端优先的常驻按钮设计，避免触摸屏无法 hover 的尴尬
                        let btnHtml = '';
                        if (item.local_status === -1) {
                            btnHtml = `<button onclick="submitRequest(${item.tmdb_id}, '${item.media_type}', '${item.title.replace(/'/g, "\\'")}', '${item.year}', '${item.poster_path}', '${(item.overview||'').replace(/'/g, "\\'")}')" class="w-full bg-indigo-50 hover:bg-indigo-600 text-indigo-700 hover:text-white font-bold py-2.5 rounded-xl transition-colors text-sm"><i class="fa-solid fa-plus mr-1"></i> 加入心愿单</button>`;
                        } else if (item.local_status === 0 || item.local_status === 1) {
                            btnHtml = `<button onclick="submitRequest(${item.tmdb_id}, '${item.media_type}', '${item.title.replace(/'/g, "\\'")}', '${item.year}', '${item.poster_path}', '')" class="w-full bg-yellow-100 text-yellow-800 hover:bg-yellow-200 font-bold py-2.5 rounded-xl transition-colors text-sm"><i class="fa-solid fa-thumbs-up mr-1"></i> 求片中 (+1)</button>`;
                        } else if (item.local_status === 2) {
                            btnHtml = `<button disabled class="w-full bg-gray-100 text-gray-400 font-bold py-2.5 rounded-xl cursor-not-allowed text-sm"><i class="fa-solid fa-check-circle mr-1 text-green-500"></i> 已入库</button>`;
                        } else {
                            btnHtml = `<button disabled class="w-full bg-gray-100 text-gray-400 font-bold py-2.5 rounded-xl cursor-not-allowed text-sm"><i class="fa-solid fa-ban mr-1"></i> 暂不收录</button>`;
                        }

                        // 🔥 电影卡片全面升级：加入评分角标
                        html += `
                        <div class="bg-white rounded-2xl p-2 sm:p-2.5 shadow-sm border border-gray-100 hover:shadow-xl transition-all duration-300 flex flex-col group transform hover:-translate-y-1">
                            <div class="relative w-full aspect-[2/3] overflow-hidden rounded-xl bg-gray-100 mb-3">
                                <img src="${item.poster_path || defaultPoster}" class="object-cover w-full h-full" loading="lazy">
                                <div class="absolute top-2 right-2 bg-black/70 backdrop-blur-md text-white text-xs font-bold px-2 py-1 rounded-lg border border-white/10 flex items-center">
                                    <i class="fa-solid fa-star text-yellow-400 mr-1 text-[10px]"></i> ${item.vote_average > 0 ? item.vote_average : '暂无'}
                                </div>
                            </div>
                            <div class="px-1 flex-grow flex flex-col justify-between mb-3">
                                <h3 class="font-bold text-gray-900 text-sm sm:text-base leading-tight line-clamp-1" title="${item.title}">${item.title}</h3>
                                <div class="text-xs text-gray-400 mt-1 font-medium flex justify-between">
                                    <span>${typeIcon} ${item.media_type === 'movie'?'电影':'剧集'}</span>
                                    <span>${item.year}</span>
                                </div>
                            </div>
                            <div class="mt-auto px-1 pb-1">
                                ${btnHtml}
                            </div>
                        </div>`;
                    });
                    document.getElementById('search-results').innerHTML = html;
                } else {
                    // 空状态设计
                    document.getElementById('search-results').innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-16"><div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-4"><i class="fa-regular fa-face-frown text-4xl text-gray-400"></i></div><p class="text-gray-500 font-medium">茫茫宇宙中，未发现该资源的踪迹</p><p class="text-xs text-gray-400 mt-1">换个搜索词，或者加上年份试试？</p></div>`;
                }
            } catch (e) {
                document.getElementById('search-loading').classList.add('hidden');
                showToast("连接星际网络失败，请联系服主", "error");
            }
        }

        async function submitRequest(id, type, title, year, poster, overview) {
            try {
                const res = await fetch('/api/requests/submit', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tmdb_id: id, media_type: type, title: title, year: year, poster_path: poster, overview: overview })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast(data.message);
                    doSearch(); // 刷新状态
                } else showToast(data.message, "error");
            } catch (e) { showToast("提交失败，网络异常", "error"); }
        }

        async function loadMyRequests() {
            document.getElementById('my-results').innerHTML = '';
            document.getElementById('my-loading').classList.remove('hidden');
            try {
                const res = await fetch('/api/requests/my');
                const data = await res.json();
                document.getElementById('my-loading').classList.add('hidden');
                
                if (data.status === 'success' && data.data.length > 0) {
                    let html = '';
                    const statusMap = {
                        0: {text: '<i class="fa-solid fa-hourglass-half mr-1"></i> 排队中', color: 'bg-yellow-50 text-yellow-700 border-yellow-200'},
                        1: {text: '<i class="fa-solid fa-cloud-arrow-down mr-1 animate-pulse"></i> 下载中', color: 'bg-blue-50 text-blue-700 border-blue-200'},
                        2: {text: '<i class="fa-solid fa-check mr-1"></i> 已入库', color: 'bg-green-50 text-green-700 border-green-200'},
                        3: {text: '<i class="fa-solid fa-xmark mr-1"></i> 被驳回', color: 'bg-red-50 text-red-700 border-red-200'}
                    };

                    data.data.forEach(item => {
                        const st = statusMap[item.status];
                        html += `
                        <div class="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 flex gap-4 items-center hover:shadow-md transition">
                            <img src="${item.poster_path || 'https://via.placeholder.com/500x750.png?text=No+Poster'}" class="w-16 h-24 object-cover rounded-xl shadow-sm">
                            <div class="flex-grow">
                                <h3 class="font-bold text-gray-900 text-sm sm:text-base leading-tight">${item.title}</h3>
                                <p class="text-xs text-gray-400 mt-1 mb-2 font-medium">${item.year} · ${item.requested_at.substring(5, 16)}</p>
                                <div class="inline-block px-3 py-1 rounded-lg text-xs font-bold border ${st.color}">${st.text}</div>
                            </div>
                        </div>`;
                    });
                    document.getElementById('my-results').innerHTML = html;
                } else {
                    document.getElementById('my-results').innerHTML = `<div class="col-span-full flex flex-col items-center py-16"><div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-box-open text-3xl text-gray-300"></i></div><p class="text-gray-500 font-medium text-sm">您的求片队列空空如也</p></div>`;
                }
            } catch (e) {}
        }

        function logout() { document.cookie = "session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;"; window.location.reload(); }
    </script>
</body>
</html>
